<!doctype html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="utf-8">
<title>{{DOC_TITLE}}</title>
<style>
  @page { size: A4 landscape; margin: 0; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: "Segoe UI", "Cairo", "IBM Plex Sans Arabic", system-ui, -apple-system, sans-serif;
    color: #1a2235; background: #fff; line-height: 1.7;
  }
  .page {
    width: 297mm; height: 210mm;
    page-break-after: always;
    padding: 14mm 16mm;
    display: flex; flex-direction: column;
    background: #fff;
  }
  .page:last-child { page-break-after: auto; }

  /* ===== Cover ===== */
  .cover {
    background: linear-gradient(135deg, #1e3a8a 0%, #2c5cdb 50%, #5b8def 100%);
    color: #fff;
    justify-content: center; align-items: center; text-align: center;
    padding: 20mm;
  }
  .cover h1 { font-size: 44px; margin: 0 0 10px; letter-spacing: -.01em; }
  .cover .subtitle { font-size: 16px; opacity: .85; margin: 0 0 28px; }
  .cover .day-label {
    font-size: 13px; padding: 6px 16px; border-radius: 999px;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.30);
    margin-bottom: 18px;
  }
  .cover .title-card {
    background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.22);
    border-radius: 14px; padding: 20px 28px; max-width: 720px;
  }
  .cover .title-card h2 { font-size: 26px; margin: 0 0 10px; letter-spacing: -.01em; }
  .cover .title-card p { font-size: 15px; opacity: .92; margin: 0; }
  .cover .footer-meta {
    margin-top: auto; padding-top: 20px;
    font-size: 12px; opacity: .75; letter-spacing: .04em;
  }

  /* ===== Day content page ===== */
  .day-content { padding: 16mm 18mm; }
  .day-content header {
    border-bottom: 1px solid #e3e7ef; padding-bottom: 10mm; margin-bottom: 10mm;
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  }
  .day-content header h2 { margin: 0; font-size: 22px; color: #0f172a; }
  .day-content header .tag {
    font-size: 11px; padding: 4px 12px; border-radius: 999px;
    background: #eaf0ff; color: #1d4ed8; border: 1px solid #cdddff;
    font-weight: 600;
  }
  .day-content .summary {
    color: #5f6b85; font-size: 14px; margin: 0 0 8mm;
  }
  .features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6mm;
  }
  .feature {
    background: #fbfcfe; border: 1px solid #e3e7ef; border-radius: 12px;
    padding: 14px 18px;
  }
  .feature h3 { margin: 0 0 6px; font-size: 15px; color: #0f172a; }
  .feature ul { margin: 6px 0 0; padding-inline-start: 18px; color: #2a364d; font-size: 13px; }
  .feature li { margin: 4px 0; }

  /* ===== Screenshot pages ===== */
  .shot { display: grid; grid-template-rows: auto 1fr auto; gap: 10mm; padding: 14mm 16mm; }
  .shot header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .shot header h2 { margin: 0; font-size: 22px; color: #0f172a; }
  .shot header .tag {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    background: #e3f7ef; color: #0d6b56; border: 1px solid #b8ebd9;
    font-weight: 600;
  }
  .shot .img-wrap {
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .shot .img-wrap img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    border: 1px solid #e3e7ef; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(15,23,42,.06);
  }
  .shot footer {
    color: #5f6b85; font-size: 12px; border-top: 1px solid #e3e7ef;
    padding-top: 5mm; display: flex; justify-content: space-between;
  }
  .shot footer b { color: #2a364d; font-weight: 600; }

  /* ===== Back cover ===== */
  .back-cover {
    background: #0f1729; color: #d6deed;
    justify-content: center; align-items: center; text-align: center; padding: 20mm;
  }
  .back-cover h2 { font-size: 22px; margin: 0 0 10px; color: #fff; }
  .back-cover p { font-size: 13px; opacity: .8; margin: 0; max-width: 680px; }
  .back-cover .brand { margin-top: 0; font-size: 13px; opacity: .65; letter-spacing: .05em; }
</style>
</head>
<body>

<!-- ===== Cover ===== -->
<section class="page cover">
  <h1>{{BRAND_NAME}}</h1>
  <div class="subtitle">{{BRAND_SUBTITLE}}</div>
  <div class="day-label">{{DAY_LABEL}}</div>
  <div class="title-card">
    <h2>{{TITLE}}</h2>
    <p>{{SUMMARY}}</p>
  </div>
  <div class="footer-meta">{{DATE}}</div>
</section>

<!-- ===== Day content ===== -->
<section class="page day-content">
  <header>
    <h2>{{TITLE}}</h2>
    <span class="tag">{{CONTENT_TAG}}</span>
  </header>
  <p class="summary">{{SUMMARY}}</p>
  <div class="features">
    {{FEATURES_HTML}}
  </div>
</section>

<!-- ===== Screenshots (optional) ===== -->
{{SCREENSHOTS_HTML}}

<!-- ===== Back cover ===== -->
<section class="page back-cover">
  <div class="brand">{{BACK_NOTE}}</div>
</section>

</body>
</html>
